<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BOLOG|首页</title>
<link rel="stylesheet" href="static/bootstrap/css/bootstrap.min.css" />
<link rel="stylesheet" href="assets/css/common.css" />
<script type="text/javascript" src="static/jquery/jquery-3.1.1.min.js" ></script>
<script type="text/javascript" src="static/bootstrap/js/bootstrap.min.js" ></script>
</head>
<body>
	<header>
		<!-- jquery填充nav.js -->
	</header>
	<div id="wrapper" class="mid-width center">
	
		<div id="img-exhibition" class="carousel slide">
		    <ol class="carousel-indicators">
		    	<!-- js填充 -->
				<li data-target="#myCarousel" data-slide-to="0" class="active"></li>
				<li data-target="#myCarousel" data-slide-to="1"></li>
				<li data-target="#myCarousel" data-slide-to="2"></li>
		    </ol>   
		    <!-- 轮播（Carousel）项目 -->
		    <div class="carousel-inner">
		    	<!-- js填充 -->
		    	<div class="item active">
					<img src="resource/image/exhibition/1.jpg" alt="First slide">
					<div class="carousel-caption">标题 1</div>
				</div>
				<div class="item">
					<img src=resource/image/exhibition/2.jpg alt="Second slide">
					<div class="carousel-caption">标题 2</div>
				</div>
				<div class="item">
					<img src="resource/image/exhibition/3.jpg" alt="Third slide">
					<div class="carousel-caption">标题 3</div>
				</div>
		    </div>
		    <a class="left carousel-control" href="#img-exhibition" role="button" data-slide="prev">
    		<span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
    		<span class="sr-only">上一张</span>
  			</a>
  			<a class="right carousel-control" href="#img-exhibition" role="button" data-slide="next">
    		<span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
    		<span class="sr-only">下一张</span>
  			</a>
		</div>
	
	
	</div>
	<footer>
		<!-- jquery填充 -->
	</footer>
</body>
<script src="assets/js/common.js"></script>
<script src="assets/js/nav.js"></script>
<script src="assets/js/footer.js"></script>
</html>
